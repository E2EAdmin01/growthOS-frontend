<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />

<!-- Tell every well-behaved crawler to ignore this page completely.
     Combined with robots.txt disallow + an unguessable URL, this keeps the
     walkthrough out of search results and link-graph discovery. -->
<meta name="robots" content="noindex, nofollow, noarchive, nosnippet, noimageindex">
<meta name="googlebot" content="noindex, nofollow, noarchive, nosnippet, noimageindex">
<meta name="bingbot" content="noindex, nofollow, noarchive, nosnippet">

<!-- Suppress social-platform link previews so the URL doesn't leak via Slack,
     LinkedIn, etc when recipients paste it. -->
<meta property="og:title" content="">
<meta property="og:description" content="">
<meta name="twitter:card" content="">
<meta name="referrer" content="no-referrer">

<title>RankActions — Preview</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;500;600;700;800&family=DM+Sans:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  /* ===== TOKENS ===== */
  :root {
    --dark: #0d0d0d;
    --dark-2: #181818;
    --dark-3: #242424;
    --cream: #f5f1e8;
    --cream-soft: #ebe6d8;
    --green: #0e7a3c;
    --green-lt: #1ea863;
    --green-glow: rgba(30, 168, 99, 0.15);
    --white: #ffffff;
    --text: #0d0d0d;
    --text-2: #525252;
    --text-3: #888888;
    --text-on-dark: #f5f1e8;
    --text-on-dark-mute: #b8b3a4;
    --text-on-dark-soft: #7a766a;
    --border-dark: #2a2a2a;
    --border-soft: #ebe6d8;
    --red: #dc2626;
    --amber: #d97706;
    --blue: #2563eb;
    --purple: #a855f7;
    --display: 'Barlow Condensed', sans-serif;
    --body: 'DM Sans', sans-serif;
    --mono: 'JetBrains Mono', monospace;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { height: 100%; }
  body {
    font-family: var(--body);
    background: var(--dark);
    color: var(--text-on-dark);
    overflow: hidden;
    -webkit-font-smoothing: antialiased;
  }

  /* ===== LAYOUT ===== */
  .app {
    display: grid;
    grid-template-columns: 320px 1fr;
    height: 100vh;
  }

  /* ===== SIDEBAR ===== */
  .sidebar {
    background: #050505;
    border-right: 1px solid var(--border-dark);
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }
  .sidebar-head {
    padding: 1.75rem 1.5rem 1.5rem;
    border-bottom: 1px solid var(--border-dark);
  }
  .wordmark {
    font-family: var(--display);
    font-weight: 700;
    font-size: 1.75rem;
    letter-spacing: -0.01em;
    line-height: 1;
  }
  .wordmark .rank { color: var(--text-on-dark); }
  .wordmark .actions { color: var(--green-lt); }
  .pill {
    display: inline-block;
    margin-top: 0.5rem;
    padding: 0.2rem 0.55rem;
    background: var(--green-glow);
    color: var(--green-lt);
    font-size: 0.65rem;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.1em;
    border-radius: 4px;
    border: 1px solid rgba(30, 168, 99, 0.25);
  }
  .sidebar-meta {
    margin-top: 0.9rem;
    color: var(--text-on-dark-mute);
    font-size: 0.78rem;
    line-height: 1.5;
  }

  .nav {
    flex: 1;
    overflow-y: auto;
    padding: 1rem 0.75rem;
  }
  .nav::-webkit-scrollbar { width: 6px; }
  .nav::-webkit-scrollbar-thumb { background: #1a1a1a; border-radius: 3px; }

  .nav-section {
    padding: 0.75rem 0.75rem 0.35rem;
    font-size: 0.65rem;
    color: var(--text-on-dark-soft);
    text-transform: uppercase;
    letter-spacing: 0.14em;
    font-weight: 600;
  }
  .nav-item {
    display: flex;
    align-items: center;
    gap: 0.7rem;
    padding: 0.6rem 0.75rem;
    margin: 0.1rem 0;
    border-radius: 6px;
    cursor: pointer;
    color: var(--text-on-dark-mute);
    transition: all 0.15s;
    user-select: none;
  }
  .nav-item:hover { background: rgba(255,255,255,0.03); color: var(--text-on-dark); }
  .nav-item.active {
    background: rgba(30, 168, 99, 0.1);
    color: var(--text-on-dark);
  }
  .nav-item.active .nav-num { color: var(--green-lt); }
  .nav-item.done .nav-num::before { content: '✓'; color: var(--green-lt); }
  .nav-item.done .nav-num span { display: none; }
  .nav-num {
    font-family: var(--mono);
    font-size: 0.7rem;
    width: 1.5rem;
    text-align: center;
    color: var(--text-on-dark-soft);
    font-weight: 500;
  }
  .nav-num::before { display: none; }
  .nav-label {
    font-size: 0.88rem;
    font-weight: 500;
    flex: 1;
  }
  .nav-tier {
    font-size: 0.6rem;
    color: var(--text-on-dark-soft);
    text-transform: uppercase;
    letter-spacing: 0.08em;
    font-weight: 600;
  }

  .sidebar-foot {
    padding: 1rem 1.5rem;
    border-top: 1px solid var(--border-dark);
    font-size: 0.72rem;
    color: var(--text-on-dark-soft);
  }
  .progress-bar {
    height: 2px;
    background: var(--border-dark);
    border-radius: 1px;
    overflow: hidden;
    margin-top: 0.5rem;
  }
  .progress-fill {
    height: 100%;
    background: var(--green-lt);
    transition: width 0.3s;
  }

  /* ===== MAIN ===== */
  .main {
    background: var(--dark);
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }
  .topbar {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 1.25rem 2rem;
    border-bottom: 1px solid var(--border-dark);
    background: var(--dark);
  }
  .topbar-title {
    font-family: var(--display);
    font-size: 1.5rem;
    font-weight: 600;
    line-height: 1;
  }
  .topbar-sub {
    color: var(--text-on-dark-mute);
    font-size: 0.82rem;
    margin-top: 0.3rem;
  }
  .topbar-controls {
    display: flex;
    align-items: center;
    gap: 0.5rem;
  }
  .ctrl {
    background: rgba(255,255,255,0.05);
    border: 1px solid var(--border-dark);
    color: var(--text-on-dark);
    padding: 0.5rem 0.85rem;
    border-radius: 6px;
    font-family: var(--body);
    font-size: 0.82rem;
    font-weight: 500;
    cursor: pointer;
    transition: all 0.15s;
    display: inline-flex;
    align-items: center;
    gap: 0.4rem;
  }
  .ctrl:hover:not(:disabled) {
    background: rgba(255,255,255,0.08);
    border-color: #404040;
  }
  .ctrl.primary {
    background: var(--green);
    border-color: var(--green);
    color: white;
  }
  .ctrl.primary:hover:not(:disabled) {
    background: var(--green-lt);
    border-color: var(--green-lt);
  }
  .ctrl:disabled { opacity: 0.4; cursor: not-allowed; }
  .ctrl-kbd {
    font-family: var(--mono);
    font-size: 0.7rem;
    background: rgba(255,255,255,0.07);
    padding: 0.1rem 0.35rem;
    border-radius: 3px;
    color: var(--text-on-dark-mute);
  }

  /* ===== STAGE ===== */
  .stage {
    flex: 1;
    overflow: hidden;
    position: relative;
    background: linear-gradient(180deg, var(--dark) 0%, #0a0a0a 100%);
  }
  .stage-inner {
    position: absolute;
    inset: 2rem;
    border-radius: 12px;
    background: var(--cream);
    color: var(--text);
    overflow: hidden;
    box-shadow: 0 30px 80px rgba(0,0,0,0.4), 0 0 0 1px var(--border-dark);
    display: flex;
    flex-direction: column;
  }

  /* App chrome (mock browser frame inside the stage) */
  .app-chrome {
    background: var(--dark);
    color: var(--text-on-dark);
    padding: 0.75rem 1.25rem;
    display: flex;
    align-items: center;
    gap: 1rem;
    flex-shrink: 0;
  }
  .app-chrome-wordmark {
    font-family: var(--display);
    font-weight: 700;
    font-size: 1.1rem;
    line-height: 1;
  }
  .app-chrome-tabs {
    display: flex;
    gap: 0.25rem;
    flex: 1;
    margin-left: 1.5rem;
  }
  .app-tab {
    padding: 0.4rem 0.8rem;
    font-size: 0.78rem;
    color: var(--text-on-dark-mute);
    border-radius: 4px;
    cursor: default;
  }
  .app-tab.active {
    background: rgba(30, 168, 99, 0.15);
    color: var(--green-lt);
    font-weight: 600;
  }
  .app-chrome-user {
    display: flex;
    align-items: center;
    gap: 0.5rem;
    font-size: 0.78rem;
  }
  .avatar {
    width: 24px; height: 24px;
    border-radius: 50%;
    background: var(--green-lt);
    color: white;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 0.7rem;
    font-weight: 700;
  }

  .app-body {
    flex: 1;
    overflow-y: auto;
    background: var(--cream);
    padding: 2rem;
    position: relative;
  }
  .app-body::-webkit-scrollbar { width: 8px; }
  .app-body::-webkit-scrollbar-thumb { background: var(--cream-soft); border-radius: 4px; }

  /* ===== CALLOUTS ===== */
  /* ===== PINS (discreet numbered markers) ===== */
  .pin {
    position: absolute;
    z-index: 10;
    width: 28px;
    height: 28px;
    border-radius: 50%;
    background: var(--green-lt);
    color: white;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: var(--mono);
    font-size: 0.78rem;
    font-weight: 700;
    cursor: pointer;
    box-shadow: 0 4px 14px rgba(30,168,99,0.4), 0 0 0 4px rgba(30,168,99,0.15);
    transition: transform 0.18s ease, box-shadow 0.18s ease, background 0.18s ease;
    opacity: 0;
    animation: pinIn 0.35s ease forwards;
    user-select: none;
    transform: translate(-50%, -50%);
  }
  .pin::before {
    /* gentle outer pulse so the pins read as "interactive" not just decorative */
    content: '';
    position: absolute;
    inset: -4px;
    border-radius: 50%;
    border: 2px solid var(--green-lt);
    opacity: 0.35;
    animation: pinPulse 2.4s ease-in-out infinite;
  }
  .pin:hover, .pin.active {
    background: var(--green);
    transform: translate(-50%, -50%) scale(1.15);
    box-shadow: 0 6px 20px rgba(30,168,99,0.55), 0 0 0 6px rgba(30,168,99,0.2);
    z-index: 20;
  }
  .pin.active::before { display: none; }
  @keyframes pinIn {
    from { opacity: 0; transform: translate(-50%, -50%) scale(0.4); }
    to { opacity: 1; transform: translate(-50%, -50%) scale(1); }
  }
  @keyframes pinPulse {
    0%, 100% { transform: scale(1); opacity: 0.4; }
    50% { transform: scale(1.18); opacity: 0; }
  }

  /* Tooltip that pops out from a hovered/clicked pin */
  .pin-tip {
    position: absolute;
    z-index: 30;
    background: var(--dark);
    color: var(--text-on-dark);
    padding: 0.85rem 1rem;
    border-radius: 8px;
    box-shadow: 0 16px 40px rgba(0,0,0,0.4), 0 0 0 1px rgba(30,168,99,0.5);
    max-width: 280px;
    font-size: 0.82rem;
    line-height: 1.5;
    pointer-events: none;
    opacity: 0;
    transform: translateY(4px);
    transition: opacity 0.15s, transform 0.15s;
  }
  .pin-tip.show {
    opacity: 1;
    transform: translateY(0);
    pointer-events: auto;
  }
  .pin-tip-title {
    font-family: var(--display);
    font-weight: 700;
    font-size: 0.92rem;
    text-transform: uppercase;
    letter-spacing: 0.03em;
    color: var(--text-on-dark);
    margin-bottom: 0.3rem;
  }
  .pin-tip-body {
    color: var(--text-on-dark-mute);
    font-size: 0.8rem;
  }
  .pin-tip::after {
    /* arrow pointing back to the pin */
    content: '';
    position: absolute;
    width: 0; height: 0;
  }
  .pin-tip.arrow-up::after {
    top: -7px;
    left: var(--arrow-x, 18px);
    border-left: 7px solid transparent;
    border-right: 7px solid transparent;
    border-bottom: 7px solid var(--dark);
  }
  .pin-tip.arrow-down::after {
    bottom: -7px;
    left: var(--arrow-x, 18px);
    border-left: 7px solid transparent;
    border-right: 7px solid transparent;
    border-top: 7px solid var(--dark);
  }
  .pin-tip.arrow-left::after {
    left: -7px;
    top: var(--arrow-y, 14px);
    border-top: 7px solid transparent;
    border-bottom: 7px solid transparent;
    border-right: 7px solid var(--dark);
  }
  .pin-tip.arrow-right::after {
    right: -7px;
    top: var(--arrow-y, 14px);
    border-top: 7px solid transparent;
    border-bottom: 7px solid transparent;
    border-left: 7px solid var(--dark);
  }

  /* ===== HIGHLIGHTS PANEL (below the stage) ===== */
  .highlights {
    flex-shrink: 0;
    background: #0a0a0a;
    border-top: 1px solid var(--border-dark);
    padding: 1rem 2rem;
    max-height: 0;
    overflow: hidden;
    transition: max-height 0.3s ease, padding 0.3s ease;
  }
  .highlights.has-content {
    max-height: 200px;
    padding: 1rem 2rem;
  }
  .highlights-head {
    display: flex;
    align-items: center;
    gap: 0.6rem;
    margin-bottom: 0.75rem;
  }
  .highlights-head .label {
    font-family: var(--display);
    font-size: 0.72rem;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.12em;
    color: var(--text-on-dark-mute);
  }
  .highlights-list {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
    gap: 0.6rem;
  }
  .highlight-chip {
    display: flex;
    align-items: flex-start;
    gap: 0.6rem;
    padding: 0.55rem 0.7rem;
    background: rgba(255,255,255,0.025);
    border: 1px solid var(--border-dark);
    border-radius: 6px;
    cursor: pointer;
    transition: all 0.15s;
  }
  .highlight-chip:hover {
    background: rgba(30, 168, 99, 0.07);
    border-color: rgba(30, 168, 99, 0.4);
  }
  .highlight-chip.active {
    background: rgba(30, 168, 99, 0.1);
    border-color: var(--green-lt);
  }
  .highlight-chip-num {
    width: 18px; height: 18px;
    border-radius: 50%;
    background: var(--green-lt);
    color: white;
    font-family: var(--mono);
    font-size: 0.65rem;
    font-weight: 700;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    margin-top: 1px;
  }
  .highlight-chip-text {
    flex: 1;
    min-width: 0;
  }
  .highlight-chip-title {
    font-family: var(--display);
    font-size: 0.85rem;
    font-weight: 600;
    color: var(--text-on-dark);
    line-height: 1.2;
  }
  .highlight-chip-body {
    color: var(--text-on-dark-soft);
    font-size: 0.75rem;
    margin-top: 0.15rem;
    line-height: 1.4;
    /* truncate to 2 lines */
    display: -webkit-box;
    -webkit-line-clamp: 2;
    -webkit-box-orient: vertical;
    overflow: hidden;
  }

  /* Highlight halo (drawn under callouts) */
  .halo {
    position: absolute;
    border: 2px solid var(--green-lt);
    border-radius: 8px;
    box-shadow: 0 0 0 4px rgba(30,168,99,0.12), 0 0 24px rgba(30,168,99,0.3);
    pointer-events: none;
    animation: pulse 2s ease-in-out infinite;
    z-index: 5;
  }
  @keyframes pulse {
    0%, 100% { box-shadow: 0 0 0 4px rgba(30,168,99,0.12), 0 0 24px rgba(30,168,99,0.3); }
    50% { box-shadow: 0 0 0 6px rgba(30,168,99,0.2), 0 0 32px rgba(30,168,99,0.5); }
  }

  /* ===== APP MOCK COMPONENTS ===== */
  .card {
    background: white;
    border: 1px solid var(--border-soft);
    border-radius: 10px;
    padding: 1.25rem;
  }
  .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; }
  .grid-3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 1rem; }
  .grid-4 { display: grid; grid-template-columns: repeat(4, 1fr); gap: 1rem; }
  .stack { display: flex; flex-direction: column; gap: 1rem; }
  .row { display: flex; align-items: center; gap: 0.75rem; }
  .between { justify-content: space-between; }

  .h1 { font-family: var(--display); font-size: 2rem; font-weight: 700; line-height: 1.1; letter-spacing: -0.01em; }
  .h2 { font-family: var(--display); font-size: 1.4rem; font-weight: 600; line-height: 1.15; }
  .h3 { font-family: var(--display); font-size: 1.1rem; font-weight: 600; line-height: 1.2; }
  .sub { color: var(--text-2); font-size: 0.9rem; }
  .label-sm { font-size: 0.7rem; color: var(--text-2); text-transform: uppercase; letter-spacing: 0.08em; font-weight: 600; }
  .stat-num { font-family: var(--mono); font-size: 1.6rem; font-weight: 600; line-height: 1; }
  .stat-num.green { color: var(--green); }
  .stat-num.amber { color: var(--amber); }
  .stat-num.red { color: var(--red); }
  .delta { font-size: 0.78rem; font-weight: 600; }
  .delta.up { color: var(--green); }
  .delta.down { color: var(--red); }

  .badge {
    display: inline-block;
    font-size: 0.65rem;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    font-weight: 700;
    padding: 0.18rem 0.5rem;
    border-radius: 3px;
  }
  .badge.green { background: rgba(14,122,60,0.1); color: var(--green); }
  .badge.amber { background: rgba(217,119,6,0.1); color: var(--amber); }
  .badge.red { background: rgba(220,38,38,0.1); color: var(--red); }
  .badge.blue { background: rgba(37,99,235,0.1); color: var(--blue); }
  .badge.purple { background: rgba(168,85,247,0.12); color: var(--purple); }
  .badge.gray { background: rgba(0,0,0,0.05); color: var(--text-2); }

  .btn {
    background: var(--green);
    color: white;
    padding: 0.5rem 0.9rem;
    border-radius: 6px;
    font-size: 0.82rem;
    font-weight: 600;
    border: none;
    cursor: default;
  }
  .btn.ghost {
    background: white;
    color: var(--text);
    border: 1px solid var(--border-soft);
  }
  .btn.dark {
    background: var(--dark);
    color: white;
  }

  /* Score gauge */
  .gauge {
    width: 100%; aspect-ratio: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    position: relative;
  }
  .gauge svg { width: 100%; height: 100%; transform: rotate(-90deg); }
  .gauge-num {
    position: absolute;
    text-align: center;
    font-family: var(--mono);
  }
  .gauge-num .v {
    font-size: 2.6rem;
    font-weight: 700;
    line-height: 1;
  }
  .gauge-num .g {
    font-size: 0.7rem;
    color: var(--text-2);
    margin-top: 0.2rem;
    text-transform: uppercase;
    letter-spacing: 0.1em;
  }

  /* Sparkline */
  .spark { width: 100%; height: 32px; }

  /* Auth screen */
  .auth-bg {
    background: var(--dark);
    color: var(--text-on-dark);
    height: 100%;
    display: grid;
    grid-template-columns: 1fr 1fr;
    margin: -2rem;
  }
  .auth-left {
    padding: 4rem;
    display: flex;
    flex-direction: column;
    justify-content: center;
    background: radial-gradient(circle at 30% 30%, rgba(30,168,99,0.12), transparent 50%), var(--dark);
  }
  .auth-right {
    padding: 4rem;
    display: flex;
    flex-direction: column;
    justify-content: center;
    background: #0a0a0a;
  }

  /* Strategy planner cluster items */
  .cluster {
    background: white;
    border: 1px solid var(--border-soft);
    border-radius: 6px;
    padding: 0.75rem 1rem;
    display: flex;
    align-items: center;
    gap: 0.75rem;
  }

  /* Welcome screen */
  .welcome {
    display: flex;
    align-items: center;
    justify-content: center;
    height: 100%;
    text-align: center;
    padding: 4rem;
  }

  /* HTML preview iframe-like */
  .preview-frame {
    background: #ffffff;
    border-radius: 6px;
    padding: 1.25rem;
    border: 1px solid var(--border-soft);
    font-family: 'Georgia', serif;
    color: #1a1a1a;
    line-height: 1.7;
  }
  .preview-frame h1 {
    font-family: var(--display);
    font-size: 1.5rem;
    margin-bottom: 0.5rem;
    color: var(--dark);
  }
  .preview-frame h2 {
    font-family: var(--display);
    font-size: 1.15rem;
    margin: 1rem 0 0.4rem;
    color: var(--dark);
  }
  .anno {
    display: inline-block;
    font-family: var(--mono);
    font-size: 0.55rem;
    background: var(--green-lt);
    color: white;
    padding: 0.08rem 0.3rem;
    border-radius: 2px;
    margin-right: 0.4rem;
    vertical-align: middle;
    text-transform: uppercase;
    letter-spacing: 0.06em;
  }

let currentStep = 0;
let visited = new Set([0]);

// Helper: shift the tooltip arrow so it points at the pin, even when the
// tooltip has been clamped to keep it within the visible area.
//   tip         - the tooltip element
//   offsetPx    - desired distance from tooltip's leading edge to the arrow
//   axis        - 'horizontal' (for arrow-up / arrow-down) or 'vertical'
function adjustArrowOffset(tip, offsetPx, axis) {
  // Keep the arrow within sane bounds — never closer than 12px to either edge
  // of its own dimension, so it always visually "points" at something tooltip-y.
  const min = 12;
  const dim = axis === 'horizontal' ? tip.offsetWidth : tip.offsetHeight;
  const clamped = Math.max(min, Math.min(offsetPx, dim - min));
  if (axis === 'horizontal') {
    tip.style.setProperty('--arrow-x', clamped + 'px');
  } else {
    tip.style.setProperty('--arrow-y', clamped + 'px');
  }
}

  document.getElementById('step-sub').textContent = step.subtitle;

  document.getElementById('next').disabled = currentStep === steps.length - 1;
  document.getElementById('next').innerHTML = currentStep === steps.length - 1
    ? 'Tour complete'

  stage.innerHTML = chrome + body + highlights;

  // Render pins inside the app body. The pin is a small circular numbered
  // marker; full title/body lives in a tooltip that pops out on hover/click,

  if (step.callouts) {
    const bodyEl = document.getElementById('app-body');

    const inferArrow = (yStr) => {

      tip.id = tipId;
      tip.innerHTML = `
        <div class="pin-tip-title">${c.title}</div>
        <div class="pin-tip-body">${c.body}</div>

      // Don't close the locked pin when clicking inside its own tooltip.
      tip.addEventListener('click', (e) => e.stopPropagation());
      bodyEl.appendChild(tip);

      // Position the tooltip cleverly so it never extends past the visible
      // app-body bounds. The pin position is fixed (user-authored); we just
      // pick the best side for the tooltip given the available space.
      //
      // Strategy:
      //   - Measure the tooltip after appending it (it's hidden but laid out)
      //   - Compute pin's actual pixel position inside the body
      //   - Try each of four sides (below, above, right, left) in order of
      //     hint preference; pick the first one that fits
      //   - Clamp the perpendicular axis (horizontal offset for above/below;
      //     vertical for left/right) so the tooltip stays inside the body
      const placeTip = () => {
        const bodyRect = bodyEl.getBoundingClientRect();

        // The tooltip is opacity:0 but laid out, so we can measure directly.
        // Need to temporarily make it visible-for-layout to get accurate width
        // because the CSS keeps it position:absolute with no explicit width.
        const tipW = tip.offsetWidth;
        const tipH = tip.offsetHeight;

        // Pin centre relative to body
        const pinCx = pinRect.left - bodyRect.left + pinRect.width / 2;
        const pinCy = pinRect.top - bodyRect.top + pinRect.height / 2;
        const bodyW = bodyEl.clientWidth;
        const bodyH = bodyEl.clientHeight;
        const offset = 18; // gap between pin and tip
        const margin = 12; // min margin from body edge
        const pinRadius = pinRect.width / 2;

        // Space available on each side
        const spaceBelow = bodyH - (pinCy + pinRadius);
        const spaceAbove = pinCy - pinRadius;
        const spaceRight = bodyW - (pinCx + pinRadius);
        const spaceLeft = pinCx - pinRadius;

        // Candidate placements with required space
        const candidates = [
          { side: 'down', fits: spaceBelow >= tipH + offset + margin },   // tip below pin (arrow up)
          { side: 'up',   fits: spaceAbove >= tipH + offset + margin },   // tip above pin (arrow down)
          { side: 'right', fits: spaceRight >= tipW + offset + margin },  // tip right of pin (arrow left)
          { side: 'left',  fits: spaceLeft  >= tipW + offset + margin },  // tip left of pin (arrow right)
        ];

        // Honour author's hint first if it fits; otherwise first fitting; otherwise side with most space
        const hint = c.arrow === 'up' ? 'down' : c.arrow === 'down' ? 'up' : c.arrow === 'left' ? 'right' : c.arrow === 'right' ? 'left' : null;
        let chosen = candidates.find(k => k.side === hint && k.fits);
        if (!chosen) chosen = candidates.find(k => k.fits);
        if (!chosen) {
          // Nothing fits cleanly — fall back to the side with the most space
          const space = { down: spaceBelow, up: spaceAbove, right: spaceRight, left: spaceLeft };
          chosen = { side: Object.entries(space).sort((a,b)=>b[1]-a[1])[0][0], fits: false };
        }

        // Apply arrow class — arrow points back TOWARDS the pin
        const arrowMap = { down: 'up', up: 'down', right: 'left', left: 'right' };
        tip.className = `pin-tip arrow-${arrowMap[chosen.side]}`;

        // Reset all position properties
        tip.style.left = '';
        tip.style.right = '';
        tip.style.top = '';
        tip.style.bottom = '';

        // Position the tip based on chosen side, then clamp perpendicular axis
        if (chosen.side === 'down') {
          const top = pinCy + pinRadius + offset;
          let left = pinCx - 22; // tooltip's arrow sits ~22px from its left edge
          left = Math.max(margin, Math.min(left, bodyW - tipW - margin));
          tip.style.top = `${top}px`;
          tip.style.left = `${left}px`;
          // Adjust arrow offset within the tooltip so it points at the pin
          adjustArrowOffset(tip, pinCx - left, 'horizontal');
        } else if (chosen.side === 'up') {
          const bottom = bodyH - (pinCy - pinRadius - offset);
          let left = pinCx - 22;
          left = Math.max(margin, Math.min(left, bodyW - tipW - margin));
          tip.style.bottom = `${bottom}px`;
          tip.style.left = `${left}px`;
          adjustArrowOffset(tip, pinCx - left, 'horizontal');
        } else if (chosen.side === 'right') {
          const left = pinCx + pinRadius + offset;
          let top = pinCy - 18; // arrow sits ~18px from tooltip's top
          top = Math.max(margin, Math.min(top, bodyH - tipH - margin));
          tip.style.left = `${left}px`;
          tip.style.top = `${top}px`;
          adjustArrowOffset(tip, pinCy - top, 'vertical');
        } else { // left
          const right = bodyW - (pinCx - pinRadius - offset);
          let top = pinCy - 18;
          top = Math.max(margin, Math.min(top, bodyH - tipH - margin));
          tip.style.right = `${right}px`;
          tip.style.top = `${top}px`;
          adjustArrowOffset(tip, pinCy - top, 'vertical');
        }
      };

      // Position once now, and reposition on resize/scroll
      // (scrolling can change body dimensions)
      requestAnimationFrame(placeTip);
      window.addEventListener('resize', placeTip);

      // Hover behaviour — show on hover, hide on leave (unless clicked-active).
      const showTip = () => { tip.classList.add('show'); pin.classList.add('active'); };
      const hideTip = () => { tip.classList.remove('show'); pin.classList.remove('active'); };
      pin.addEventListener('mouseenter', showTip);
      pin.addEventListener('mouseleave', () => { if (!pin.dataset.locked) hideTip(); });

      // Click toggles a "locked open" state so users on touch devices (or
      // anyone who wants to read at their own pace) can keep the tip open.
      pin.addEventListener('click', (e) => {
        e.stopPropagation();
        // Close any other locked tips first
        document.querySelectorAll('.pin').forEach(p => {
          if (p !== pin) {
            delete p.dataset.locked;
            const otherTip = document.getElementById(p.dataset.tip);
            if (otherTip) otherTip.classList.remove('show');
            p.classList.remove('active');
          }
        });
        if (pin.dataset.locked) {
          delete pin.dataset.locked;
          hideTip();
        } else {
          pin.dataset.locked = '1';
          showTip();
        }
      });

      // Corresponding chip in the highlights panel
      if (listEl) {
        const chip = document.createElement('div');
        chip.className = 'highlight-chip';
        chip.innerHTML = `
          <div class="highlight-chip-num">${i + 1}</div>
          <div class="highlight-chip-text">
            <div class="highlight-chip-title">${c.title}</div>
            <div class="highlight-chip-body">${c.body}</div>
          </div>
        `;
        chip.addEventListener('mouseenter', () => {
          chip.classList.add('active');
          showTip();
        });
        chip.addEventListener('mouseleave', () => {
          chip.classList.remove('active');
          if (!pin.dataset.locked) hideTip();
        });
        chip.addEventListener('click', () => {
          // Scroll the pin into view if needed, then lock the tip open
          pin.scrollIntoView({ behavior: 'smooth', block: 'center' });
          // Close other locked pins
          document.querySelectorAll('.pin').forEach(p => {
            if (p !== pin) {
              delete p.dataset.locked;
              const otherTip = document.getElementById(p.dataset.tip);
              if (otherTip) otherTip.classList.remove('show');
              p.classList.remove('active');
            }
          });
          pin.dataset.locked = '1';
          showTip();
        });
        listEl.appendChild(chip);
      }
    });

    // Click anywhere outside a pin/tip clears the locked state
    document.getElementById('app-body').addEventListener('click', () => {
      document.querySelectorAll('.pin').forEach(p => {
        if (p.dataset.locked) {
          delete p.dataset.locked;
          const tip = document.getElementById(p.dataset.tip);
          if (tip) tip.classList.remove('show');
          p.classList.remove('active');
        }
      });
    });
  }
}

function renderWelcome(step) {
  if (step.finish) {
    return `
      <div class="welcome-screen">
        <div class="welcome-card">
          <div class="welcome-hero"><span class="rank">Rank</span><span class="actions">Actions</span></div>
          <div class="welcome-tagline">That's the whole product.</div>
          <div class="welcome-sub">You've seen all 10 modules. Real Google data, AI-prioritised actions, audit-grade PDFs, agency white-label, GDPR self-service. Built for UK SMBs and the agencies that serve them.</div>
          <div class="welcome-meta">
            <div><span class="dot"></span>Launching soon</div>
            <div><span class="dot"></span>Founder pricing available</div>
            <div><span class="dot"></span>rankactions.com</div>
          </div>
          <button class="welcome-cta" onclick="goTo(0)">↻ Restart the tour</button>
        </div>
      </div>
    `;
  }
  return `
    <div class="welcome-screen">
      <div class="welcome-card">
        <div class="welcome-hero"><span class="rank">Rank</span><span class="actions">Actions</span></div>
        <div class="welcome-tagline">SEO that tells you what to do next.</div>
        <div class="welcome-sub">A 5-minute tour of every feature. 11 modules. Real screens, real flows, real data. Use ← and → keys to navigate, or click the modules on the left.</div>
        <div class="welcome-meta">
          <div><span class="dot"></span>UK SMBs</div>
          <div><span class="dot"></span>Marketing teams</div>
          <div><span class="dot"></span>Agencies</div>
        </div>
        <button class="welcome-cta" onclick="goTo(1)">Start the tour →</button>
        <div class="welcome-kbd">Or press <span>→</span> to begin</div>
      </div>
    </div>
  `;
}

function renderNav() {
  const nav = document.getElementById('nav');
  let html = '';
  let lastSection = null;
  steps.forEach((s, i) => {
    if (s.section !== lastSection) {
      html += `<div class="nav-section">${s.section}</div>`;
      lastSection = s.section;
    }
    const isActive = i === currentStep;
    const isDone = visited.has(i) && !isActive;
    html += `
      <div class="nav-item ${isActive ? 'active' : ''} ${isDone ? 'done' : ''}" onclick="goTo(${i})">
        <div class="nav-num"><span>${String(i).padStart(2, '0')}</span></div>
        <div class="nav-label">${s.navLabel}</div>
        ${s.tier ? `<div class="nav-tier">${s.tier}</div>` : ''}
      </div>
    `;
  });
  nav.innerHTML = html;
}

function goTo(i) {
  if (i < 0 || i >= steps.length) return;
  currentStep = i;
  visited.add(i);
  render();
}

document.getElementById('prev').onclick = () => goTo(currentStep - 1);
document.getElementById('next').onclick = () => goTo(currentStep + 1);

document.addEventListener('keydown', (e) => {
  if (e.key === 'ArrowRight') goTo(currentStep + 1);
  if (e.key === 'ArrowLeft') goTo(currentStep - 1);
});

// Initial render
render();
</script>

</body>
</html>
